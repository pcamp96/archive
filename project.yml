name: Archive
options:
  bundleIdPrefix: com.pcamp96
  deploymentTarget:
    macOS: "15.0"
packages:
  Markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    from: 0.7.3
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 6.2.1
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.pcamp96.Archive
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  Archive:
    type: application
    platform: macOS
    sources:
      - path: Archive
    settings:
      base:
        PRODUCT_NAME: Archive
        INFOPLIST_KEY_CFBundleDisplayName: Archive
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - package: Markdown
        product: Markdown
      - package: Yams
        product: Yams
  ArchiveTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ArchiveTests
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Archive.app/Contents/MacOS/Archive"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Archive

